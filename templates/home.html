<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Exam Performance Indicator</title>
    <style>
      :root {
        --ink: #1f2a3c;
        --ink-soft: #445066;
        --paper: #f6f2e7;
        --paper-line: #d8cfb8;
        --margin-red: #b1493f;
        --accent: #2f6f5e;
        --accent-dark: #234f42;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 48px 20px;
        min-height: 100vh;
        background: var(--paper);
        background-image: linear-gradient(
          var(--paper-line) 1px,
          transparent 1px
        );
        background-size: 100% 32px;
        font-family: "Georgia", "Iowan Old Style", serif;
        color: var(--ink);
        display: flex;
        justify-content: center;
      }

      .sheet {
        position: relative;
        width: 100%;
        max-width: 640px;
        background: var(--paper);
        border: 1px solid var(--paper-line);
        box-shadow: 0 18px 40px -20px rgba(31, 42, 60, 0.35);
        padding: 44px 44px 40px 76px;
      }

      /* red margin rule, like a notebook page */
      .sheet::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 48px;
        width: 1px;
        background: var(--margin-red);
        opacity: 0.55;
      }

      .masthead {
        margin-bottom: 6px;
      }

      .eyebrow {
        font-family: "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-dark);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 1px solid var(--paper-line);
        padding-bottom: 10px;
        margin-bottom: 22px;
      }

      h1.title {
        font-size: 27px;
        line-height: 1.25;
        font-weight: 700;
        margin: 0 0 4px 0;
        color: var(--ink);
      }

      .subtitle {
        font-family: "Courier New", monospace;
        font-size: 12.5px;
        color: var(--ink-soft);
        margin: 0 0 30px 0;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .field {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      label {
        font-family: "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      select,
      input[type="number"] {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        font-family: "Georgia", serif;
        font-size: 15px;
        color: var(--ink);
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--paper-line);
        padding: 8px 2px;
        transition: border-color 0.15s ease;
      }

      select {
        cursor: pointer;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%),
          linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%);
        background-position:
          calc(100% - 12px) 16px,
          calc(100% - 6px) 16px;
        background-size:
          6px 6px,
          6px 6px;
        background-repeat: no-repeat;
      }

      select:focus,
      input[type="number"]:focus {
        outline: none;
        border-bottom-color: var(--accent);
      }

      select:focus-visible,
      input[type="number"]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      input::placeholder {
        color: #a9a397;
      }

      .submit-row {
        margin-top: 12px;
        padding-top: 22px;
        border-top: 1px dashed var(--paper-line);
      }

      button.submit {
        width: 100%;
        padding: 14px 18px;
        background: var(--accent);
        color: #f6f2e7;
        border: none;
        font-family: "Courier New", monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.15s ease,
          transform 0.05s ease;
      }

      button.submit:hover {
        background: var(--accent-dark);
      }

      button.submit:active {
        transform: translateY(1px);
      }

      .result-card {
        margin-top: 26px;
        padding: 18px 20px;
        background: #fffdf8;
        border: 1px solid var(--paper-line);
        border-left: 4px solid var(--accent);
      }

      .result-label {
        font-family: "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 0 0 6px 0;
      }

      .result-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--ink);
        margin: 0;
      }

      @media (max-width: 520px) {
        .sheet {
          padding: 36px 24px 32px 52px;
        }
        .sheet::before {
          left: 28px;
        }
        .field-row {
          grid-template-columns: 1fr;
          gap: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <div class="masthead">
        <div class="eyebrow">
          <span>Academic Record</span>
          <span>Form 04-M</span>
        </div>
        <h1 class="title">Student Exam Performance Indicator</h1>
        <p class="subtitle">
          Enter the details below to estimate the maths score.
        </p>
      </div>

      <form action="{{ url_for('predict_datapoint') }}" method="post">
        <div class="field-row">
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" class="form-control" name="gender" required>
              <option selected disabled value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div class="field">
            <label for="ethnicity">Race / Ethnicity</label>
            <select
              id="ethnicity"
              class="form-control"
              name="ethnicity"
              required
            >
              <option selected disabled value="">Select</option>
              <option value="group A">Group A</option>
              <option value="group B">Group B</option>
              <option value="group C">Group C</option>
              <option value="group D">Group D</option>
              <option value="group E">Group E</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="parental_level_of_education"
            >Parental Level of Education</label
          >
          <select
            id="parental_level_of_education"
            class="form-control"
            name="parental_level_of_education"
            required
          >
            <option selected disabled value="">Select</option>
            <option value="associate's degree">Associate's degree</option>
            <option value="bachelor's degree">Bachelor's degree</option>
            <option value="high school">High school</option>
            <option value="master's degree">Master's degree</option>
            <option value="some college">Some college</option>
            <option value="some high school">Some high school</option>
          </select>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="lunch">Lunch Type</label>
            <select id="lunch" class="form-control" name="lunch" required>
              <option selected disabled value="">Select</option>
              <option value="free/reduced">Free / reduced</option>
              <option value="standard">Standard</option>
            </select>
          </div>

          <div class="field">
            <label for="test_preparation_course">Test Preparation Course</label>
            <select
              id="test_preparation_course"
              class="form-control"
              name="test_preparation_course"
              required
            >
              <option selected disabled value="">Select</option>
              <option value="none">None</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="reading_score">Reading Score (0–100)</label>
            <input
              id="reading_score"
              class="form-control"
              type="number"
              name="reading_score"
              placeholder="e.g. 72"
              min="0"
              max="100"
              required
            />
          </div>

          <div class="field">
            <label for="writing_score">Writing Score (0–100)</label>
            <input
              id="writing_score"
              class="form-control"
              type="number"
              name="writing_score"
              placeholder="e.g. 68"
              min="0"
              max="100"
              required
            />
          </div>
        </div>

        <div class="submit-row">
          <button class="submit" type="submit">Predict maths score</button>
        </div>
      </form>

      {% if results %}
      <div class="result-card">
        <p class="result-label">Predicted maths score</p>
        <p class="result-value">{{ results }}</p>
      </div>
      {% endif %}
    </main>
  </body>
</html>
